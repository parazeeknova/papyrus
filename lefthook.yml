pre-commit:
  jobs:
    - run: bun run autobump:staged
      glob:
        - "apps/**/*"
        - "packages/**/*"
        - "apps/**/package.json"
        - "packages/**/package.json"
        - "apps/collab/mix.exs"
        - "scripts/autobump-workspaces.ts"
      stage_fixed: true
    - run: bun x ultracite fix
      glob:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.json"
        - "**/*.jsonc"
        - "**/*.css"
      stage_fixed: true
    - run: cd apps/collab && mix format
      glob:
        - "apps/collab/**/*.ex"
        - "apps/collab/**/*.exs"
        - "apps/collab/mix.exs"
      stage_fixed: true
