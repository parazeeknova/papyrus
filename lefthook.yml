pre-commit:
  jobs:
    - run: bun x ultracite fix
      glob:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.json"
        - "**/*.jsonc"
        - "**/*.css"
      stage_fixed: true
    - run: cd apps/collab && mix format
      glob:
        - "apps/collab/**/*.ex"
        - "apps/collab/**/*.exs"
        - "apps/collab/mix.exs"
      stage_fixed: true
